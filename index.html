<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Perfume Store</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f9f9f9; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 250px; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .price { color: #27ae60; font-size: 18px; font-weight: bold; margin: 10px 0; }
        .btn { background-color: #25D366; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <h1>हमारे लग्जरी परफ्यूम्स</h1>
    <div id="loading">परफ्यूम्स लोड हो रहे हैं...</div>
    <div class="container" id="perfume-list"></div>

    <script>
        // 📌 सिर्फ अपनी असली Google Sheet ID यहाँ डालें (बाकी कुछ नहीं बदलना)
        const SHEET_ID = '13rNvj9LgIuMGplhhNrScH8I8cwguZ5inDTzGphm1EqY'
        
        // आपका अपना व्हाट्सएप नंबर (देश के कोड के साथ, जैसे 919876543210)
        const WHATSAPP_NUMBER = '919898647697'

        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                // गूगल शीट के डेटा को साफ़ करना
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                const container = document.getElementById('perfume-list');

                // यदि शीट खाली है
                if(rows.length <= 1) {
                    container.innerHTML = "<p>अभी कोई परफ्यूम उपलब्ध नहीं है।</p>";
                    return;
                }

                // पहली लाइन (row[0]) हेडर की होती है, इसलिए i = 1 से शुरू कर रहे हैं
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i].c;
                    
                    const name = row[0] ? row[0].v : 'No Name';
                    const price = row[1] ? row[1].v : '0';
                    const desc = row[2] ? row[2].v : '';
                    const image = row[3] ? row[3].v : 'https://via.placeholder.com/300';

                    // व्हाट्सएप मैसेज का लिंक तैयार करना
                    const whatsappLink = `https://wa.me/${WHATSAPP_NUMBER}?text=नमस्ते, मुझे आपका यह परफ्यूम ऑर्डर करना है: ${encodeURIComponent(name)}`;

                    // स्क्रीन पर दिखाने के लिए कार्ड बनाना
                    container.innerHTML += `
                        <div class="card">
                            <img src="${image}" alt="${name}">
                            <h3>${name}</h3>
                            <p>${desc}</p>
                            <div class="price">₹${price}</div>
                            <a href="${whatsappLink}" target="_blank" class="btn">WhatsApp पर ऑर्डर करें</a>
                        </div>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('loading').innerText = "डेटा लोड करने में समस्या आई। कृपया अपनी गूगल शीट की शेयर सेटिंग्स चेक करें।";
                console.error(err);
            });
    </script>
</body>
</html>
