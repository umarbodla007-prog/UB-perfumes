<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Perfume Brand</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; text-align: center; padding: 20px; }
        .title { color: #333; margin-bottom: 30px; }
        .product-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .product-card { background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 20px; width: 250px; text-align: center; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .product-name { font-size: 1.2rem; margin: 15px 0 5px; color: #222; }
        .product-price { font-size: 1.1rem; color: #b12704; font-weight: bold; margin-bottom: 10px; }
        .product-desc { font-size: 0.9rem; color: #666; height: 40px; overflow: hidden; }
        .buy-btn { display: inline-block; background-color: #25D366; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1 class="title">हमारे लक्जरी परफ्यूम्स</h1>
    
    <!-- यहाँ हमारे परफ्यूम्स अपने आप दिखाई देंगे -->
    <div id="perfume-list" class="product-container">
        <p>परफ्यूम्स लोड हो रहे हैं...</p>
    </div>

    <script>
        // ⚠️ यहाँ अपनी असली Google Sheet ID और अपनी Sheet का नाम डालें
        const SHEET_ID = 13rNvj9LgIuMGplhhNrScH8I8cwguZ5inDTzGphm1EqY
        const SHEET_NAME = 'Sheet1'; // आपकी शीट के टैब का नाम

        // गूगल शीट से डेटा खींचने का लिंक
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                // गूगल शीट के कच्चे डेटा को साफ़ और सही फॉर्मेट में बदलना
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                const perfumeList = document.getElementById('perfume-list');
                perfumeList.innerHTML = ''; // लोड हो रहे हैं मैसेज को हटाना

                // हर लाइन (Row) के लिए एक प्रोडक्ट कार्ड बनाना
                rows.forEach(row => {
                    const name = row.c[0] ? row.c[0].v : 'Perfume';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const description = row.c[2] ? row.c[2].v : '';
                    const image = row.c[3] ? row.c[3].v : 'https://via.placeholder.com/200';

                    // व्हाट्सएप पर ऑर्डर भेजने का लिंक (अपना नंबर 91XXXXXXXXXX की जगह डालें)
                    const whatsappLink = `https://wa.me/919898647697?text=नमस्ते, मुझे आपका यह परफ्यूम ऑर्डर करना है: ${name}`;

                    const productHTML = `
                        <div class="product-card">
                            <img src="${image}" alt="${name}">
                            <div class="product-name">${name}</div>
                            <div class="product-desc">${description}</div>
                            <div class="product-price">₹${price}</div>
                            <a href="${whatsappLink}" target="_blank" class="buy-btn">WhatsApp पर ऑर्डर करें</a>
                        </div>
                    `;
                    perfumeList.innerHTML += productHTML;
                });
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('perfume-list').innerHTML = '<p>परफ्यूम लोड करने में दिक्कत आ रही है। कृपया अपनी शीट आईडी चेक करें।</p>';
            });
    </script>
</body>
</html>
