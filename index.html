<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>My Perfume Store</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f9f9f9; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 250px; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .btn { background-color: #25D366; color: white; padding: 10px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>हमारे लग्जरी परफ्यूम्स</h1>
    <div id="perfume-list">लोड हो रहा है...</div>

    <script>
        // 📌 अपनी शीट आईडी यहाँ डालें
        const SHEET_ID = '13rNvj9LgIuMGplhhNrScH8I8cwguZ5inDTzGphm1EqY'
        const WHATSAPP_NUMBER = '919898647697'; // अपना नंबर

        // CSV फॉर्मेट का लिंक (यह सबसे पक्का तरीका है)
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        fetch(url)
            .then(res => res.text())
            .then(csvText => {
                const rows = csvText.split('\n');
                const container = document.getElementById('perfume-list');
                container.innerHTML = ''; // लोडिंग हटा दें

                if (rows.length <= 1) {
                    container.innerHTML = "<p>आपकी शीट में डेटा नहीं मिल रहा है।</p>";
                    return;
                }

                // i = 1 से शुरू करें (ताकि हेडर हट जाए)
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    if (columns.length < 3) continue; // अगर लाइन खाली है तो छोड़ें

                    const name = columns[0];
                    const price = columns[1];
                    const desc = columns[2];
                    const image = columns[3] || 'https://via.placeholder.com/300';

                    container.innerHTML += `
                        <div class="card">
                            <img src="${image}" alt="${name}">
                            <h3>${name}</h3>
                            <p>${desc}</p>
                            <p><b>₹${price}</b></p>
                            <a href="https://wa.me/${WHATSAPP_NUMBER}?text=मुझे ${name} चाहिए" class="btn">WhatsApp पर ऑर्डर करें</a>
                        </div>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('perfume-list').innerText = "त्रुटि: अपनी शीट पब्लिक करना न भूलें!";
            });
    </script>
</body>
</html>
