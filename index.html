<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UB Perfumes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #ffffff; color: #121212; padding-bottom: 30px; }
        .announcement-bar { background-color: #121212; color: #ffffff; font-size: 11px; padding: 8px 0; text-align: center; text-transform: uppercase; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #f2f2f2; }
        h1 { font-size: 24px; letter-spacing: 2px; }
        
        /* स्लाइडर की स्टाइल */
        .hero-slider { width: 100%; height: 260px; position: relative; overflow: hidden; margin-bottom: 25px; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .main-content { padding: 0 15px; }
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .image-container { width: 100%; padding-top: 100%; position: relative; overflow: hidden; border-radius: 10px; margin-bottom: 10px; }
        .product-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
        .btn { display: block; background: #121212; color: #fff; text-align: center; padding: 8px; border-radius: 20px; text-decoration: none; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="announcement-bar">✨ Free Delivery on Orders Above ₹999 ✨</div>

    <header><h1>UB PERFUMES</h1></header>

    <!-- ⬇️ यहाँ सिर्फ अपनी दो फोटो के लिंक डालें ⬇️ -->
    <div class="hero-slider">
        <div class="slide active">
            <img src="https://i.postimg.cc/260XJss6/1783948960500.png" alt="Slide 1">
        </div>
        <div class="slide">
            <img src="https://i.postimg.cc/ZKnyRcV3/1784382018134.png" alt="Slide 2">
        </div>
    </div>
    <!-- ⬆️ स्लाइडर खत्म ⬆️ -->

    <div class="main-content">
        <div class="container" id="perfume-list"></div>
    </div>

    <script>
        const SHEET_ID = '13rNvj9LgIuMGplhhNrScH8I8cwguZ5inDTzGphm1EqY'; 
        const WHATSAPP_NUMBER = '919898647697'; // अपना नंबर यहाँ डालें

        // स्लाइडर लॉजिक
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 3000);

        // डेटा लोडिंग
        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
            .then(res => res.text())
            .then(csv => {
                const rows = csv.split('\n').slice(1);
                const container = document.getElementById('perfume-list');
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return;
                    const name = cols[0].replace(/['"]+/g, '');
                    const price = cols[1].replace(/['"]+/g, '');
                    const img = cols[3] ? cols[3].replace(/['"]+/g, '').trim() : 'https://via.placeholder.com/200';
                    container.innerHTML += `
                        <div class="card">
                            <div class="image-container"><img class="product-img" src="${img}"></div>
                            <h3>${name}</h3>
                            <p>Rs. ${price}</p>
                            <a href="https://wa.me/${WHATSAPP_NUMBER}?text=मुझे ${name} चाहिए" class="btn">WhatsApp</a>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
