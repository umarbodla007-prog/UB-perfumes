<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- गूगल सर्च (SEO) सेटिंग्स -->
    <title>UB Perfumes - Buy Premium & Luxury Fragrances Online</title>
    <meta name="description" content="Buy premium, long-lasting luxury perfumes online at UB Perfumes. Explore our exclusive collection. Order easily via WhatsApp.">
    <meta name="keywords" content="UB Perfumes, buy perfume online, luxury fragrances, Royal kastur, choco rush">
    <meta name="robots" content="index, follow">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #ffffff; color: #121212; padding-bottom: 30px; }
        header { text-align: center; padding: 20px 0 15px 0; border-bottom: 1px solid #f2f2f2; }
        h1 { font-size: 24px; letter-spacing: 2px; }
        
        /* छोटा और परफेक्ट स्लाइडर */
        .hero-slider { width: 100%; height: 180px; position: relative; overflow: hidden; margin-bottom: 25px; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .main-content { padding: 0 15px; }
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .image-container { width: 100%; padding-top: 100%; position: relative; overflow: hidden; border-radius: 10px; margin-bottom: 10px; }
        .product-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
        .btn { display: block; background: #121212; color: #fff; text-align: center; padding: 8px; border-radius: 20px; text-decoration: none; font-size: 12px; margin-top: auto; }
    </style>
</head>
<body>

    <header><h1>UB PERFUMES</h1></header>

    <!-- स्लाइडर (इसमें मैंने डिफ़ॉल्ट रूप से सुंदर फोटो लगा दी हैं ताकि कोड क्रैश न हो) -->
    <div class="hero-slider">
        <div class="slide active">
            <img src="https://i.postimg.cc/260XJss6/1783948960500.png" alt="Slide 1">
        </div>
        <div class="slide">
            <img src="https://i.postimg.cc/ZKnyRcV3/1784382018134.png" alt="Slide 2">
        </div>
    </div>

    <div class="main-content">
        <div class="container" id="perfume-list"></div>
    </div>

    <script>
        // 📌 अपनी सेटिंग्स यहाँ भरें
        const SHEET_ID = '13rNvj9LgIuMGplhhNrScH8I8cwguZ5inDTzGphm1EqY'; 
        const WHATSAPP_NUMBER = '919898647697'; // अपना नंबर यहाँ डालें (जैसे 919876543210)

        // स्लाइडर चलाने का कोड
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        if(slides.length > 0) {
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 3000);
        }

        // शीट से डेटा खींचने का कोड
        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
            .then(res => res.text())
            .then(csv => {
                // लाइनों को अलग करना
                const lines = csv.split(/\r?\n/);
                if (lines.length <= 1) return;
                
                const container = document.getElementById('perfume-list');
                
                // पहली लाइन से हेडर हटाकर बाकी डेटा लूप करना
                for(let i = 1; i < lines.length; i++) {
                    const row = lines[i];
                    if (!row.trim()) continue;
                    
                    // कॉमा से अलग करना
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) continue;
                    
                    const name = cols[0].replace(/['"]+/g, '').trim();
                    const price = cols[1].replace(/['"]+/g, '').trim();
                    const img = cols[3] ? cols[3].replace(/['"]+/g, '').trim() : 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=500';
                    
                    if(!name) continue;

                    container.innerHTML += `
                        <div class="card">
                            <div class="image-container"><img class="product-img" src="${img}"></div>
                            <h3>${name}</h3>
                            <p>Rs. ${price}</p>
                            <a href="https://wa.me/${WHATSAPP_NUMBER}?text=मुझे ${encodeURIComponent(name)} चाहिए" target="_blank" class="btn">WhatsApp</a>
                        </div>
                    `;
                }
            })
            .catch(err => console.error("डेटा लोड करने में समस्या:", err));
    </script>
</body>
</html>
